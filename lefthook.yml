# lefthook.yml — pre-commit and pre-push hooks for budget-sortbot
#
# Install hooks after cloning:
#   cd frontend && npm ci
# This runs `npm prepare`, which calls `lefthook install` from the repo root.
#
# Tool placement rationale:
#   pre-commit : fast checks — Kotlin format, TypeScript format+lint — reject bad
#                code before it enters the commit graph.
#   pre-push   : full test suite (backend + frontend) — tests are slow enough that
#                running them at commit time would be punishing; pre-push keeps the
#                gate while keeping commits fast.

